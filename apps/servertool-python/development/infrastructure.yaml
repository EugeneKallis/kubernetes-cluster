apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: servertool-infrastructure-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EugeneKallis/kubernetes-cluster.git
    targetRevision: HEAD
    path: charts/servertool-python/infrastructure
    helm:
      valueFiles:
      - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
