apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: servertool-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EugeneKallis/kubernetes-cluster.git
    targetRevision: HEAD
    path: charts/servertool-python/agent
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
