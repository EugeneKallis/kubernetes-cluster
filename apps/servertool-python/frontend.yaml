apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: servertool-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:EugeneKallis/kubernetes-cluster.git
    targetRevision: HEAD
    path: charts/servertool-python/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
