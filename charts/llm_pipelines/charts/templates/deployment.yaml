apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-llm-pipelines
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-llm-pipelines
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-llm-pipelines
      annotations:
        rollout.network.extension.pyserv.com/restartedAt: {{ now | quote }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Release.Name }}-llm-pipelines
              topologyKey: kubernetes.io/hostname
      containers:
      - name: llm-pipelines
        image: "{{ .Values.image.repository }}:{{ .Values.global.image.tag | default .Values.image.tag }}"
        imagePullPolicy: Always
        env:
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: WEBHOOK_URL
          value: {{ .Values.env.WEBHOOK_URL | quote }}
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.existingSecret.name | quote }}
              key: {{ .Values.env.existingSecret.key | quote }}
        - name: OLLAMA_HOST
          value: {{ .Values.env.OLLAMA_HOST | quote }}
        - name: MODEL
          value: {{ .Values.env.MODEL | quote }}
        ports:
        - containerPort: {{ .Values.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-pipelines
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-llm-pipelines
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    {{- if and (eq (.Values.service.type | default "ClusterIP") "NodePort") .Values.service.nodePort }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
