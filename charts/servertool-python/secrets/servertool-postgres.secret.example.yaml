apiVersion: v1
kind: Secret
metadata:
  name: servertool-postgres
  namespace: development
type: Opaque
stringData:
  # Update password in values-dev.yaml when creating from example
  # Format: postgresql://postgres:<PASSWORD>@192.168.1.150:5432/servertool_dev
  database-url: "postgresql://postgres:REPLACE_WITH_PASSWORD@192.168.1.150:5432/servertool_dev"
