apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
  - port: {{ .Values.redis.port }}
  selector:
    app: redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-master
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        command: ["redis-server", "--appendonly", "yes"]
        ports:
        - containerPort: {{ .Values.redis.port }}
        volumeMounts:
        - name: redis-data
          mountPath: /data
