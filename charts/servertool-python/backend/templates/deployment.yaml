apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
      annotations:
        rollout.network.extension.pyserv.com/restartedAt: {{ now | quote }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Release.Name }}-backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: "{{ .Values.image.repository }}:{{ .Values.global.image.tag | default .Values.image.tag }}"
        imagePullPolicy: Always
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.database.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.database.port | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.database.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret.name | quote }}
              key: {{ .Values.database.existingSecret.key | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.database.name | quote }}
        - name: REDIS_URL
          value: {{ .Values.global.redisUrl | quote }}
        - name: REDIS_CHANNEL_PREFIX
          value: {{ .Values.global.redisChannelPrefix | quote }}
        - name: OLLAMA_HOST
          value: {{ .Values.global.ollamaHost | default .Values.ollamaHost | default "http://localhost:11434" | quote }}
        - name: MAGNET_BRIDGE_URL
          value: {{ .Values.magnetBridgeUrl | default "http://magnet-bridge:8081" | quote }}
        - name: MANAGED_CATEGORY
          value: {{ .Values.managedCategory | default "special" | quote }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ .Values.corsAllowedOrigins | quote }}
        ports:
        - containerPort: {{ .Values.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-backend
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    {{- if and (eq (.Values.service.type | default "ClusterIP") "NodePort") .Values.service.nodePort }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
