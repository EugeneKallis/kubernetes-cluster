enabled: false

# Must stay at 1 — multiple replicas would race to process the same torrent
replicaCount: 1

image:
  repository: eugenekallis/servertoolpython-magnet-bridge
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  host: magnetbridge.k3s.lan

hostMountPath: "/mnt"
containerMountPath: "/mnt"

env:
  DECYPHARR_URL: "http://192.168.1.99:8282"
  TORRENT_DEST_DIR: "/mnt/debrid/media"
  MANAGED_CATEGORY: "special"
  DEBUG_SKIP_MOVE: "false"
