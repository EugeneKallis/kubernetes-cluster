deployment:
  kind: DaemonSet
providers:
  kubernetesGateway:
    enabled: true
ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
gateway:
  listeners:
    web:
      port: 80
      namespacePolicy:
        from: All
service:
  type: LoadBalancer
additionalArguments:
  - "--providers.kubernetesgateway.statusaddress.service.name=traefik"
  - "--providers.kubernetesgateway.statusaddress.service.namespace=traefik"
